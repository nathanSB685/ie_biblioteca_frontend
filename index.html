<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Sistema Estudantil</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">
            <img src="assets/images/logo.png" alt="Condex IA"></img>
        </a>
      </div>
      <div class="nav-buttons">
        <button onclick="window.location.href='home.html'">Área do Estudante</button>
        <button onclick="window.location.href='painel-biblio.html'">Área do Funcionário</button>
        <button onclick="fazerLogout()">Sair</button>
      </div>
    </nav>
    <div class="container">
      <h2>Acesse sua conta</h2>
      <form id="form-login" onsubmit="event.preventDefault(); logarUsuario();">
        <input
          type="email"
          id="email"
          placeholder="E-mail institucional"
          required
        />
        <input type="password" id="senha" placeholder="Senha" required />
        <button type="submit" class="btn-verde">Entrar no Sistema</button>
      </form>

      <div style="text-align: center; margin-top: 20px">
        <p>
          Ainda não tem uma conta?
          <a
            href="cadastro.html"
            style="color: #1abc9c; text-decoration: none; font-weight: bold"
            >Criar conta</a
          >
        </p>
      </div>
    </div>
    <script src="components/footer.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
